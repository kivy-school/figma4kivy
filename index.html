<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma2Kv</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: #1e1e1e; color: #ccc;
      display: flex; flex-direction: column;
    }
    #urlBar {
      display: flex; gap: 6px; align-items: center;
      padding: 8px 10px; background: #252525;
      border-bottom: 1px solid #333; flex-shrink: 0;
    }
    #serverUrl {
      flex: 1; background: #2c2c2c; color: #fff;
      border: 1px solid #444; border-radius: 4px;
      padding: 5px 8px; font-size: 11px;
    }
    button {
      background: #3c3c3c; color: #ccc; border: none;
      padding: 5px 12px; border-radius: 4px;
      cursor: pointer; font-size: 12px; white-space: nowrap;
    }
    button:hover { background: #505050; }
    #connectBtn.active { background: #1a7a3a; color: #fff; }
    #connectBtn.active:hover { background: #1f9445; }
    #tabBar {
      display: flex; gap: 0;
      border-bottom: 1px solid #333;
      background: #1e1e1e; flex-shrink: 0;
    }
    .tab {
      background: transparent; color: #888; border: none;
      border-bottom: 2px solid transparent;
      padding: 6px 14px; cursor: pointer;
      font-size: 12px; border-radius: 0;
    }
    .tab:hover { color: #ccc; background: transparent; }
    .tab.tab-active { color: #18a0fb; border-bottom-color: #18a0fb; }
    #mainFrame {
      flex: 1; border: none; width: 100%;
      min-height: 0; background: #1e1e1e; display: block;
    }
    .resizeHandle {
      position: fixed; bottom: 0;
      width: 24px; height: 24px; z-index: 100;
    }
    #resizeHandleRight { right: 0; cursor: nwse-resize; }
    #resizeHandleLeft  { left: 0;  cursor: s-resize; }
    #resizeHandleRight {
      background:
        radial-gradient(circle, #666 1.5px, transparent 1.5px) 14px 14px,
        radial-gradient(circle, #666 1.5px, transparent 1.5px) 8px 14px,
        radial-gradient(circle, #666 1.5px, transparent 1.5px) 14px 8px;
      background-repeat: no-repeat;
    }
    #resizeHandleRight:hover {
      background:
        radial-gradient(circle, #18a0fb 1.5px, transparent 1.5px) 14px 14px,
        radial-gradient(circle, #18a0fb 1.5px, transparent 1.5px) 8px 14px,
        radial-gradient(circle, #18a0fb 1.5px, transparent 1.5px) 14px 8px;
      background-repeat: no-repeat;
    }
    #resizeHandleLeft {
      background:
        radial-gradient(circle, #666 1.5px, transparent 1.5px) 8px 14px,
        radial-gradient(circle, #666 1.5px, transparent 1.5px) 14px 14px,
        radial-gradient(circle, #666 1.5px, transparent 1.5px) 8px 8px;
      background-repeat: no-repeat;
    }
    #resizeHandleLeft:hover {
      background:
        radial-gradient(circle, #18a0fb 1.5px, transparent 1.5px) 8px 14px,
        radial-gradient(circle, #18a0fb 1.5px, transparent 1.5px) 14px 14px,
        radial-gradient(circle, #18a0fb 1.5px, transparent 1.5px) 8px 8px;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>
  <div id="urlBar">
    <input id="serverUrl" type="text" value="http://localhost:8765" placeholder="Server URL" />
    <button id="connectBtn">Connect</button>
    <button id="backgroundBtn">Background</button>
  </div>
  <div id="tabBar">
    <button class="tab tab-active" data-route="/canvas-py">Canvas</button>
    <button class="tab" data-route="/widget-py">Widget</button>
  </div>
  <iframe id="mainFrame"></iframe>
  <div id="resizeHandleLeft" class="resizeHandle"></div>
  <div id="resizeHandleRight" class="resizeHandle"></div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
